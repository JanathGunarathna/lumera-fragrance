# ===== Server =====
server.port=8080

# ===== MySQL Database =====
spring.datasource.url=jdbc:mysql://localhost:3306/lumera_db?useSSL=true&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=admin

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.sql.init.mode=always

# ===== JWT =====
# 256-bit+ secret, change this in production and load from env var instead
app.jwt.secret=ChangeThisSuperSecretKeyForLumeraFragranceJWTAuth2026MinLength256Bits
app.jwt.expiration-ms=86400000

# ===== File upload (product images) =====
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
app.upload.dir=uploads/products

# ===== CORS =====
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000
